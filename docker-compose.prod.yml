# ChordMiniApp Production Docker Compose Configuration
# Builds images from source for x86 compatibility
#
# Quick Start:
#   1. Copy .env.docker.example to .env.docker and configure your values
#   2. Run: docker-compose -f docker-compose.prod.yml --env-file .env.docker up -d --build
#   3. Access: http://localhost:3001
#
# Stop:
#   docker-compose -f docker-compose.prod.yml down

services:
  # Frontend - Next.js Application
  frontend:
    platform: linux/amd64
    env_file:
      - .env.docker
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      # System Configuration
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_TELEMETRY_DISABLED=${NEXT_TELEMETRY_DISABLED:-1}

      # Firebase Configuration (Public) comes from env_file: .env.docker.
      # Keep these out of compose interpolation to avoid empty host-shell values overriding env_file.

      # API Configuration
      # Public (exposed to browser)
      # NEXT_PUBLIC_YOUTUBE_API_KEY comes from env_file: .env.docker
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:3001}
      # Server-side only (Python backend URL for chord/beat/key detection)
      - PYTHON_API_URL=${PYTHON_API_URL:-http://backend:8080}

      # Feature Flags (Public)
      - NEXT_PUBLIC_AUDIO_STRATEGY=${NEXT_PUBLIC_AUDIO_STRATEGY:-ytdlp}
      - NEXT_PUBLIC_ENABLE_TRUE_STREAMING=${NEXT_PUBLIC_ENABLE_TRUE_STREAMING:-false}
      - NEXT_DISABLE_DEV_OVERLAY=${NEXT_DISABLE_DEV_OVERLAY:-true}

      # Server-Only Secrets (Never exposed to browser) come from env_file: .env.docker

      # Development Flags (Server-only)
      - USE_MOCK_MUSIC_AI=${USE_MOCK_MUSIC_AI:-false}
      - USE_FIREBASE_EMULATOR=${USE_FIREBASE_EMULATOR:-false}
    volumes:
      # Audio cache for caching downloaded audio files
      - ./audio-cache:/app/audio_cache
    depends_on:
      - backend
    networks:
      - chordmini-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend - Python Flask ML Service
  backend:
    platform: linux/amd64
    env_file:
      - .env.docker
    build:
      context: ./python_backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - DEFAULT_BEAT_MODEL=beat-transformer
      - DEFAULT_CHORD_MODEL=chord-cnn-lstm
      - MAX_CONTENT_LENGTH=104857600
      - UPLOAD_TIMEOUT=600
    volumes:
      # Optional: Mount cache directory for model caching
      - backend-cache:/tmp/model_cache
      # Audio cache for caching downloaded audio files
      - ./audio-cache:/app/audio_cache
    networks:
      - chordmini-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional HTTPS reverse proxy for trusted-origin access
  # Enable with profile: https-proxy
  reverse-proxy:
    image: caddy:2-alpine
    profiles:
      - https-proxy
    ports:
      - "${HTTPS_PROXY_HTTP_PORT:-3080}:80"
      - "${HTTPS_PROXY_HTTPS_PORT:-3443}:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
    networks:
      - chordmini-network
    restart: unless-stopped

  # Optional Cloudflare Zero Trust Tunnel sidecar
  # Enable with profile: cloudflare-tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles:
      - cloudflare-tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - reverse-proxy
    networks:
      - chordmini-network
    restart: unless-stopped

networks:
  chordmini-network:
    driver: bridge

volumes:
  backend-cache:
  caddy-data:
  caddy-config:

